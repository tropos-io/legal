title: Tropos Legal Portal
description: Public policies and legal notices for Tropos Management BV

# Bespoke layout (docs/_layouts/default.html) — no theme.
# Without a theme, pages get no layout unless assigned; this applies it site-wide.
defaults:
  - scope:
      path: ""
    values:
      layout: default

logo: /assets/Tropos_logo_black_300dpi_RGB.png

# Google Analytics (rendered by the layout head)
ga_tracking: G-TKW9F957F6
ga_tracking_anonymize_ip: true

markdown: kramdown

# Safelisted on GitHub Pages' managed build; serves /gtcs/ -> /terms/
plugins:
  - jekyll-redirect-from
